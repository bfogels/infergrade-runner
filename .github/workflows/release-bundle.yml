name: Build Release Bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      include_image_archives:
        description: "Build and include Docker image archives in the uploaded bundle"
        default: false
        required: false
        type: boolean
      release_version:
        description: "Optional release version override; defaults to VERSION"
        required: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event_name == 'workflow_dispatch' && inputs.include_image_archives && 180 || 30 }}
    env:
      INFERGRADE_RELEASE_INCLUDE_IMAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.include_image_archives && '1' || '0' }}
      INFERGRADE_RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_version || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag
        if: github.ref_type == 'tag'
        run: python3 ./scripts/check_release_tag.py --tag "$GITHUB_REF_NAME" --commit "$GITHUB_SHA" --main-ref origin/main

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Runner package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./python/runner-core

      - name: Build release bundle
        id: release_bundle
        run: ./scripts/build_release_bundle.sh

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: infergrade-runner-release-${{ steps.release_bundle.outputs.release_version }}
          path: ${{ steps.release_bundle.outputs.bundle_dir }}/**
          if-no-files-found: error
          retention-days: 7
