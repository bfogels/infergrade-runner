name: llama.cpp Runtime Intake

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: read

concurrency:
  group: llama-cpp-runtime-intake
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Fetch official latest-release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p runtime-intake
          curl --fail --show-error --silent --location \
            --retry 3 \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ggml-org/llama.cpp/releases/latest \
            > runtime-intake/latest-release.json

      - name: Validate pins and build advisory intake report
        run: |
          python3 scripts/check_llama_cpp_runtime_policy.py \
            --latest-release-json runtime-intake/latest-release.json \
            --report-json runtime-intake/report.json \
            --report-markdown runtime-intake/report.md
          cat runtime-intake/report.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload intake report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: llama-cpp-runtime-intake-${{ github.run_id }}
          path: runtime-intake/
          retention-days: 14
