name: Desktop Runner Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer desktop app version to publish; defaults to VERSION on main"
        default: ""
        required: false
      notes:
        description: "Short release notes shown in the updater"
        default: "InferGrade Runner desktop update."
        required: false

permissions:
  contents: read

jobs:
  macos-preview:
    name: Build and publish macOS desktop app
    runs-on: macos-latest
    permissions:
      contents: write
    environment: release
    env:
      DESKTOP_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
      RELEASE_TAG: desktop-runner-latest
      RELEASE_NOTES: ${{ github.event_name == 'workflow_dispatch' && inputs.notes || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release metadata
        run: |
          if [ -z "$DESKTOP_VERSION" ]; then
            DESKTOP_VERSION="$(cat VERSION)"
          fi
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="InferGrade Runner desktop update for ${GITHUB_SHA}."
          fi
          echo "DESKTOP_VERSION=$DESKTOP_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES=$RELEASE_NOTES" >> "$GITHUB_ENV"

      - name: Check desktop app dependencies
        run: ./scripts/build_desktop_runner.sh --check-only

      - name: Verify signing and notarization inputs
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          INFERGRADE_MACOS_SIGNING_IDENTITY: ${{ vars.INFERGRADE_MACOS_SIGNING_IDENTITY || secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          missing=()
          for name in \
            TAURI_SIGNING_PRIVATE_KEY \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_TEAM_ID \
            INFERGRADE_MACOS_SIGNING_IDENTITY
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          use_api_key=0
          if [ -n "${APPLE_API_KEY:-}" ] || [ -n "${APPLE_API_ISSUER:-}" ] || [ -n "${APPLE_API_PRIVATE_KEY:-}" ]; then
            use_api_key=1
            for name in APPLE_API_KEY APPLE_API_ISSUER APPLE_API_PRIVATE_KEY; do
              if [ -z "${!name:-}" ]; then
                missing+=("$name")
              fi
            done
          elif [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_PASSWORD:-}" ]; then
            for name in APPLE_ID APPLE_PASSWORD; do
              if [ -z "${!name:-}" ]; then
                missing+=("$name")
              fi
            done
          fi
          if [ "${#missing[@]}" -ne 0 ]; then
            printf '::error::Missing desktop release signing/notarization input(s): %s\n' "${missing[*]}"
            echo "The desktop release workflow publishes user-downloadable artifacts, so it must not fall back to ad-hoc signing or skip notarization."
            exit 1
          fi
          if [ "$INFERGRADE_MACOS_SIGNING_IDENTITY" = "-" ]; then
            echo "::error::INFERGRADE_MACOS_SIGNING_IDENTITY must be a Developer ID signing identity for protected desktop releases, not ad-hoc '-'."
            exit 1
          fi
          if [ "$use_api_key" -eq 1 ]; then
            echo "APPLE_NOTARIZATION_MODE=api_key" >> "$GITHUB_ENV"
          else
            echo "APPLE_NOTARIZATION_MODE=apple_id" >> "$GITHUB_ENV"
          fi

      - name: Validate Apple signing certificate password
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          cert_path="$RUNNER_TEMP/infergrade-release-certificate.p12"
          trap 'rm -f "$cert_path"' EXIT
          if ! printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$cert_path" 2>/dev/null; then
            printf '%s' "$APPLE_CERTIFICATE" | base64 -D > "$cert_path"
          fi
          if ! openssl pkcs12 \
            -in "$cert_path" \
            -passin env:APPLE_CERTIFICATE_PASSWORD \
            -nokeys \
            -clcerts \
            -out /dev/null >/dev/null 2>&1 && \
            ! openssl pkcs12 -legacy \
              -in "$cert_path" \
              -passin env:APPLE_CERTIFICATE_PASSWORD \
              -nokeys \
              -clcerts \
              -out /dev/null >/dev/null 2>&1; then
            echo "::error::APPLE_CERTIFICATE could not be opened with APPLE_CERTIFICATE_PASSWORD. Re-export the Developer ID Application certificate as a .p12 and update both GitHub release-environment secrets together."
            exit 1
          fi

      - name: Prepare App Store Connect API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          if [ "$APPLE_NOTARIZATION_MODE" != "api_key" ]; then
            exit 0
          fi
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Set desktop app version
        run: |
          node -e "if (!/^\\d+\\.\\d+\\.\\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(process.env.DESKTOP_VERSION)) { throw new Error('DESKTOP_VERSION must be SemVer-like'); }"
          cd apps/desktop-runner
          npm version "$DESKTOP_VERSION" --no-git-tag-version --allow-same-version
          node <<'NODE'
          const fs = require("fs");
          const path = "src-tauri/tauri.conf.json";
          const config = JSON.parse(fs.readFileSync(path, "utf8"));
          config.version = process.env.DESKTOP_VERSION;
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Build signed updater artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          INFERGRADE_MACOS_SIGNING_IDENTITY: ${{ vars.INFERGRADE_MACOS_SIGNING_IDENTITY || secrets.APPLE_SIGNING_IDENTITY }}
        run: ./scripts/build_desktop_runner.sh --with-updater --skip-checks

      - name: Notarize macOS DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: ./scripts/notarize_desktop_dmg.sh

      - name: Verify macOS signing and notarization
        run: ./scripts/verify_desktop_macos_release.sh

      - name: Write updater manifest
        run: |
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}"
          python3 ./scripts/write_desktop_update_manifest.py \
            --bundle-dir apps/desktop-runner/src-tauri/target/release/bundle/macos \
            --version "$DESKTOP_VERSION" \
            --base-url "$BASE_URL" \
            --notes "$RELEASE_NOTES" \
            --output apps/desktop-runner/src-tauri/target/release/bundle/macos/infergrade-runner-desktop-latest.json

      - name: Write release checksums
        run: |
          python3 ./scripts/write_desktop_release_checksums.py \
            --output apps/desktop-runner/src-tauri/target/release/bundle/macos/SHA256SUMS \
            apps/desktop-runner/src-tauri/target/release/bundle/dmg/*.dmg \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/*.tar.gz \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/*.tar.gz.sig \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/infergrade-runner-desktop-latest.json

      - name: Publish desktop release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "InferGrade Runner Desktop" --prerelease --notes "$RELEASE_NOTES"
          gh release edit "$RELEASE_TAG" --title "InferGrade Runner Desktop" --notes "$RELEASE_NOTES" --prerelease
          gh release upload "$RELEASE_TAG" \
            apps/desktop-runner/src-tauri/target/release/bundle/dmg/*.dmg \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/*.tar.gz \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/*.tar.gz.sig \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/infergrade-runner-desktop-latest.json \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/SHA256SUMS \
            --clobber

  windows-package-smoke:
    name: Build Windows desktop packages
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install desktop dependencies
        shell: bash
        run: |
          cd apps/desktop-runner
          npm ci
          npm run build

      - name: Build Windows sidecar
        shell: bash
        run: ./scripts/build_desktop_sidecar.sh

      - name: Build unsigned Windows packages
        shell: bash
        run: |
          cd apps/desktop-runner
          npm run build:windows

      - name: Write Windows package checksums
        shell: bash
        run: |
          python3 ./scripts/write_desktop_release_checksums.py \
            --output apps/desktop-runner/src-tauri/target/release/bundle/windows/SHA256SUMS \
            apps/desktop-runner/src-tauri/target/release/bundle/nsis/*.exe \
            apps/desktop-runner/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Windows package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: infergrade-runner-desktop-windows-${{ github.sha }}
          if-no-files-found: error
          path: |
            apps/desktop-runner/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop-runner/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop-runner/src-tauri/target/release/bundle/windows/SHA256SUMS

  linux-package-smoke:
    name: Build Linux desktop packages
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        run: |
          cd apps/desktop-runner
          npm ci
          npm run build

      - name: Build Linux sidecar
        run: ./scripts/build_desktop_sidecar.sh

      - name: Build unsigned Linux packages
        run: |
          cd apps/desktop-runner
          npm run build:linux

      - name: Write Linux package checksums
        run: |
          python3 ./scripts/write_desktop_release_checksums.py \
            --output apps/desktop-runner/src-tauri/target/release/bundle/linux/SHA256SUMS \
            apps/desktop-runner/src-tauri/target/release/bundle/deb/*.deb \
            apps/desktop-runner/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Linux package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: infergrade-runner-desktop-linux-${{ github.sha }}
          if-no-files-found: error
          path: |
            apps/desktop-runner/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop-runner/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop-runner/src-tauri/target/release/bundle/linux/SHA256SUMS
