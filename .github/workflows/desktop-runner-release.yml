name: Desktop Runner Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer desktop app version to publish; defaults to VERSION on main"
        default: "0.1.14"
        required: false
      notes:
        description: "Short release notes shown in the updater"
        default: "InferGrade Runner desktop update."
        required: false

permissions:
  contents: write

jobs:
  macos-preview:
    name: Build and publish macOS desktop app
    runs-on: macos-latest
    environment: release
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      INFERGRADE_MACOS_SIGNING_IDENTITY: ${{ vars.INFERGRADE_MACOS_SIGNING_IDENTITY }}
      DESKTOP_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
      RELEASE_TAG: desktop-runner-latest
      RELEASE_NOTES: ${{ github.event_name == 'workflow_dispatch' && inputs.notes || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release metadata
        run: |
          if [ -z "$DESKTOP_VERSION" ]; then
            DESKTOP_VERSION="$(cat VERSION)"
          fi
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="InferGrade Runner desktop update for ${GITHUB_SHA}."
          fi
          echo "DESKTOP_VERSION=$DESKTOP_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES=$RELEASE_NOTES" >> "$GITHUB_ENV"

      - name: Set desktop app version
        run: |
          node -e "if (!/^\\d+\\.\\d+\\.\\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(process.env.DESKTOP_VERSION)) { throw new Error('DESKTOP_VERSION must be SemVer-like'); }"
          cd apps/desktop-runner
          npm version "$DESKTOP_VERSION" --no-git-tag-version --allow-same-version
          node <<'NODE'
          const fs = require("fs");
          const path = "src-tauri/tauri.conf.json";
          const config = JSON.parse(fs.readFileSync(path, "utf8"));
          config.version = process.env.DESKTOP_VERSION;
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Build signed updater artifacts
        run: ./scripts/build_desktop_runner.sh --with-updater

      - name: Write updater manifest
        run: |
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}"
          python3 ./scripts/write_desktop_update_manifest.py \
            --bundle-dir apps/desktop-runner/src-tauri/target/release/bundle/macos \
            --version "$DESKTOP_VERSION" \
            --base-url "$BASE_URL" \
            --notes "$RELEASE_NOTES" \
            --output apps/desktop-runner/src-tauri/target/release/bundle/macos/infergrade-runner-desktop-latest.json

      - name: Write release checksums
        run: |
          python3 ./scripts/write_desktop_release_checksums.py \
            --output apps/desktop-runner/src-tauri/target/release/bundle/macos/SHA256SUMS \
            apps/desktop-runner/src-tauri/target/release/bundle/dmg/*.dmg \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/*.tar.gz \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/*.tar.gz.sig \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/infergrade-runner-desktop-latest.json

      - name: Publish desktop release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "InferGrade Runner Desktop" --prerelease --notes "$RELEASE_NOTES"
          gh release edit "$RELEASE_TAG" --title "InferGrade Runner Desktop" --notes "$RELEASE_NOTES" --prerelease
          gh release upload "$RELEASE_TAG" \
            apps/desktop-runner/src-tauri/target/release/bundle/dmg/*.dmg \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/*.tar.gz \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/*.tar.gz.sig \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/infergrade-runner-desktop-latest.json \
            apps/desktop-runner/src-tauri/target/release/bundle/macos/SHA256SUMS \
            --clobber
