name: Publish Contract Bundle

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Runner package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./python/runner-core

      - name: Export contract bundle
        run: |
          python ./scripts/export_contract_bundle.py

      - name: Upload contract artifact
        uses: actions/upload-artifact@v4
        with:
          name: infergrade-runner-contract-bundle
          path: dist/contracts/**
