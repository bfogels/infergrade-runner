name: Publish Containers

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Container tag to publish
        required: true
        default: 0.1.25-preview
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: infergrade-runner-core
            dockerfile: containers/runner-core/Dockerfile
          - image: infergrade-llama-cpp
            dockerfile: containers/llama-cpp/Dockerfile
          - image: infergrade-ifeval
            dockerfile: containers/capability-ifeval/Dockerfile
          - image: infergrade-evalplus
            dockerfile: containers/capability-evalplus/Dockerfile
          - image: infergrade-mmlu-pro
            dockerfile: containers/capability-mmlu-pro/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.image_tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
