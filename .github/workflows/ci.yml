name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./python/runner-core

      - name: Check version declarations
        run: |
          python3 ./scripts/sync_versions.py --check
          python3 ./scripts/check_versions.py

      - name: Check main PR version bump
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        run: |
          git fetch origin main --depth=1
          python3 ./scripts/check_version_bump.py --base-ref origin/main

      - name: Run Python test suite
        run: ./scripts/test_all.sh

  rust:
    name: Rust workspace (build, test, clippy, fmt)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build (engine + cli + sidecar)
        run: cargo build --workspace --exclude infergrade_desktop_runner --locked

      - name: cargo test (engine + cli + sidecar)
        run: cargo test --workspace --exclude infergrade_desktop_runner --locked

      - name: Build desktop sidecar binary (needed by Tauri shell)
        run: bash ./scripts/build_desktop_sidecar.sh

      - name: cargo build (desktop shell)
        run: cargo build -p infergrade_desktop_runner --lib --locked

      - name: cargo test (desktop shell)
        run: cargo test -p infergrade_desktop_runner --lib --locked

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  cargo-audit:
    name: cargo audit (advisory snapshot, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install cargo-audit (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit@0.21

      - name: cargo audit
        # Job-level continue-on-error keeps this advisory step non-blocking;
        # do not also append `|| true` so a real audit failure surfaces in
        # the run UI instead of silently passing.
        run: cargo audit --file Cargo.lock

  cargo-deny:
    name: cargo deny (advisories + bans + licenses)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install cargo-deny (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19

      - name: cargo deny check
        run: cargo deny check --hide-inclusion-graph
