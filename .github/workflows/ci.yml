name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./python/runner-core
          python -m pip install ruff==0.15.22

      - name: Lint Python
        run: python -m ruff check python scripts

      - name: Check version declarations
        run: |
          python3 ./scripts/sync_versions.py --check
          python3 ./scripts/check_versions.py
          python3 ./scripts/check_llama_cpp_runtime_policy.py

      - name: Validate changed release version
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        run: |
          if git diff --quiet origin/main...HEAD -- VERSION; then
            echo "VERSION is unchanged; this is a version-neutral source promotion."
          else
            python3 ./scripts/check_version_bump.py --base-ref origin/main
          fi

      - name: Run Python test suite
        run: ./scripts/test_all.sh

  rust:
    name: Rust workspace (build, test, clippy, fmt)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build (engine + cli + sidecar)
        run: cargo build --workspace --exclude infergrade_desktop_runner --locked

      - name: cargo test (engine + cli + sidecar)
        run: cargo test --workspace --exclude infergrade_desktop_runner --locked

      - name: Build desktop sidecar binary (needed by Tauri shell)
        run: bash ./scripts/build_desktop_sidecar.sh

      - name: cargo build (desktop shell)
        run: cargo build -p infergrade_desktop_runner --lib --locked

      - name: cargo test (desktop shell)
        run: cargo test -p infergrade_desktop_runner --lib --locked

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  cargo-audit:
    name: cargo audit (advisory snapshot, non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install cargo-audit (prebuilt)
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-audit@0.22.2

      - name: cargo audit
        # Keep the snapshot visible as a warning without making its expected
        # advisory/parser churn block the cargo-deny enforcement gate.
        continue-on-error: true
        run: cargo audit --file Cargo.lock

  cargo-deny:
    name: cargo deny (advisories + bans + licenses)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install cargo-deny (prebuilt)
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-deny@0.19

      - name: cargo deny check
        run: cargo deny check --hide-inclusion-graph
